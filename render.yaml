services:
  - type: web
    name: dealleads-portal
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3000
      - key: MONGODB_URI
        sync: false
      - key: ADMIN_KEY
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
